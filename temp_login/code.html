<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }

        /* Liquid Glass Card Effect */
        .liquid-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px) saturate(120%);
            -webkit-backdrop-filter: blur(40px) saturate(120%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 
                inset 0 1px 1px rgba(255, 255, 255, 0.05),
                0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .liquid-input {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .liquid-input:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(222, 219, 200, 0.4);
            outline: none;
            box-shadow: 0 0 0 4px rgba(222, 219, 200, 0.05);
        }

        /* Cinematic Fade Loop */
        @keyframes videoFade {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 0.9; }
        }

        .video-container {
            animation: videoFade 12s ease-in-out infinite;
        }

        /* Prisma Reveal Style */
        .reveal-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(222, 219, 200, 0.5), transparent);
            width: 0;
            margin: 0 auto;
            animation: expandLine 1.2s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }

        @keyframes expandLine {
            to { width: 100%; }
        }

        .fade-in-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            animation-delay: 0.4s;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom Scrollbar for premium feel */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>

<input class="liquid-input w-full px-6 py-4 rounded-lg text-white font-body-md" id="email" name="email" placeholder="name@studio.com" required="" type="email"/>
</div>
<div class="space-y-stack-sm">

</div>

        </div>
<div class="flex gap-stack-md pointer-events-auto">
<a class="font-label-sm text-label-sm uppercase text-on-secondary-container hover:text-primary transition-colors" href="#">Privacy</a>
<a class="font-label-sm text-label-sm uppercase text-on-secondary-container hover:text-primary transition-colors" href="#">Terms</a>
</div>
</footer>
<!-- Interactive Atmospheric Micro-interaction -->
<script>
        document.addEventListener('mousemove', (e) => {
            const card = document.querySelector('.liquid-glass');
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            // Subtle mouse-follow glow on the card
            card.style.setProperty('--mouse-x', `${x}px`);
            card.style.setProperty('--mouse-y', `${y}px`);
            
            // Subtle tilt effect
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = (y - centerY) / 50;
            const rotateY = (centerX - x) / 50;

            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        document.addEventListener('mouseleave', () => {
            const card = document.querySelector('.liquid-glass');
            card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg)`;
        });
    </script>
