<style>
        body {
            background-color: #000000;
            margin: 0;
            overflow: hidden;
        }
        .liquid-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .liquid-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .liquid-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #DEDBC8;
            outline: none;
            box-shadow: 0 0 0 1px rgba(222, 219, 200, 0.2);
        }
        .prisma-reveal {
            overflow: hidden;
            position: relative;
        }
        .prisma-reveal::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 1px;
            background: #DEDBC8;
            transition: width 1.2s ease, left 1.2s ease;
        }
        .prisma-reveal.active::after {
            width: 100%;
            left: 0;
        }
        .fade-in-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen font-body-md text-on-surface">
<!-- Cinematic Video Background Placeholder -->
<div class="fixed inset-0 z-0">
<div class="w-full h-full object-cover brightness-50" data-alt="A cinematic, high-definition background featuring slow-moving, dark abstract smoke and liquid textures swirling in a deep black void. The lighting is moody and directional, with subtle warm highlights of cream and gold catching the edges of the moving shapes. The aesthetic is extremely minimalist, high-prestige, and evokes a sense of deep creative mystery. The overall atmosphere is premium and polished, perfectly complementing a luxury digital studio brand." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAPlykKh1fnAePqPmGjuatDIiqHhM2fyWeFTIaTtnIZw8KmJlEHVmp8Pzx88EQd_aQe5pQkuiKUJq2MG3DY90zLRl0JYwocLfYdlbG6jQ_XdqCK7krpFdNtUv_DvRD_QsNnh3s5NouyG8JEpiiWqDXzFR3BpQi7gdxBPcWZwrsCZ3AWipB7C6GyjUjww-AjVe4o_OSDmkrncMMOaP23l3Zim6lJOb05NrRZdmRSoMWB-5dMem7IKCrE1oug--TENKJj1z9Cr_4-VhC2')"></div>
<div class="absolute inset-0 bg-black/40"></div>
</div>
<!-- Main Container -->
<main class="relative z-10 w-full max-w-xl px-gutter">
<div class="liquid-glass rounded-xl p-10 md:p-12 fade-in-up">
<!-- Heading -->
<header class="text-center mb-stack-lg">
<h1 class="font-accent-italic text-display-lg-mobile md:text-headline-lg italic tracking-tight text-white mb-2 prisma-reveal" id="header-text">
                    Join the Collective
                </h1>
<p class="font-body-md text-on-surface-variant delay-1 fade-in-up">
                    Entry into the PRISMA creative ecosystem.
                </p>
</header>
<!-- Sign Up Form -->
<form class="space-y-stack-md delay-2 fade-in-up" onsubmit="event.preventDefault();">
<div class="space-y-stack-sm">
<label class="font-label-sm uppercase tracking-widest text-on-surface-variant opacity-60" for="name">Full Name</label>
<input class="w-full px-6 py-4 rounded-lg liquid-input text-white font-body-md placeholder:text-outline-variant/50" id="name" placeholder="ALEXANDER VANCE" type="text"/>
</div>
<div class="space-y-stack-sm">
<label class="font-label-sm uppercase tracking-widest text-on-surface-variant opacity-60" for="email">Email Address</label>
<input class="w-full px-6 py-4 rounded-lg liquid-input text-white font-body-md placeholder:text-outline-variant/50" id="email" placeholder="CONNECT@STUDIO.COM" type="email"/>
</div>
<div class="space-y-stack-sm">
<label class="font-label-sm uppercase tracking-widest text-on-surface-variant opacity-60" for="password">Password</label>
<input class="w-full px-6 py-4 rounded-lg liquid-input text-white font-body-md placeholder:text-outline-variant/50" id="password" placeholder="••••••••" type="password"/>
</div>
<!-- CTA Button -->
<div class="pt-stack-md">
<button class="w-full py-5 rounded-full bg-primary-container text-on-primary font-label-sm uppercase tracking-widest font-bold hover:scale-[1.02] active:scale-95 transition-all duration-300 shadow-xl shadow-black/20">
                        Create Account
                    </button>
</div>
</form>
<!-- Footer Links -->
<footer class="mt-stack-lg text-center space-y-stack-md delay-3 fade-in-up">
<p class="font-body-md text-on-surface-variant">
                    Already have an account? 
                    <a class="text-white font-bold border-b border-primary-container/30 hover:border-primary-container transition-colors" href="#">Login</a>
</p>
<p class="font-label-sm text-on-surface-variant/40 leading-relaxed max-w-xs mx-auto">
                    By signing up, you agree to our Terms of Service and Privacy Policy. All artistic assets are protected.
                </p>
</footer>
</div>
</main>
<!-- Global Decoration Elements -->
<div class="fixed top-12 left-12 z-20 pointer-events-none">
<span class="font-headline-md font-extrabold tracking-tighter text-white opacity-20">PRISMA</span>
</div>
<script>
        // Trigger reveal animation after a small delay
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('header-text').classList.add('active');
            }, 800);
        });

        // Simple form interaction
        const inputs = document.querySelectorAll('.liquid-input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').style.opacity = '1';
                input.parentElement.querySelector('label').style.color = '#DEDBC8';
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').style.opacity = '0.6';
                input.parentElement.querySelector('label').style.color = '';
            });
        });
    </script>
</body></html>
